{
  "info": {
    "name": "GitHub - Update Nexus7000 Running Config",
    "_postman_id": "github-update-nexus-config",
    "description": "Update PUN-CLM-Nexus7000-WT1 running config in banking-payment-services repo",
    "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
  },
  "variable": [
    {
      "key": "github_token",
      "value": "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"
    },
    {
      "key": "owner",
      "value": "coreycooper762-jpg"
    },
    {
      "key": "repo",
      "value": "banking-payment-services"
    },
    {
      "key": "file_path",
      "value": "configs/PUN-CLM-Nexus7000-WT1_running-config.cfg"
    },
    {
      "key": "branch",
      "value": "main"
    },
    {
      "key": "file_sha",
      "value": ""
    },
    {
      "key": "encoded_content",
      "value": ""
    }
  ],
  "item": [
    {
      "name": "Step 1 - Get File SHA",
      "event": [
        {
          "listen": "test",
          "script": {
            "exec": [
              "if (pm.response.code === 200) {",
              "    let json = pm.response.json();",
              "    pm.collectionVariables.set('file_sha', json.sha);",
              "    console.log('SHA captured: ' + json.sha);",
              "    console.log('File size: ' + json.size + ' bytes');",
              "",
              "    let content = atob(json.content.replace(/\\n/g, ''));",
              "    console.log('--- Current File Content (first 500 chars) ---');",
              "    console.log(content.substring(0, 500));",
              "",
              "    pm.test('SHA captured - ready to update', function () {",
              "        pm.expect(json.sha).to.be.a('string');",
              "    });",
              "} else {",
              "    pm.test('Failed to get file', function () {",
              "        pm.expect.fail('Status: ' + pm.response.code + ' - ' + pm.response.text());",
              "    });",
              "}"
            ],
            "type": "text/javascript"
          }
        }
      ],
      "request": {
        "method": "GET",
        "header": [
          {
            "key": "Authorization",
            "value": "Bearer {{github_token}}"
          },
          {
            "key": "Accept",
            "value": "application/vnd.github+json"
          },
          {
            "key": "X-GitHub-Api-Version",
            "value": "2022-11-28"
          }
        ],
        "url": {
          "raw": "https://api.github.com/repos/{{owner}}/{{repo}}/contents/{{file_path}}?ref={{branch}}",
          "protocol": "https",
          "host": ["api", "github", "com"],
          "path": ["repos", "{{owner}}", "{{repo}}", "contents", "{{file_path}}"],
          "query": [
            {
              "key": "ref",
              "value": "{{branch}}"
            }
          ]
        }
      }
    },
    {
      "name": "Step 2 - Update File",
      "event": [
        {
          "listen": "prerequest",
          "script": {
            "exec": [
              "let configContent = `!",
              "! PUN-CLM-Nexus7000-WT1 Running Configuration",
              "! Cisco Nexus 7000 Series - NX-OS 8.4(2)",
              "! Last Modified: 2026-02-28 14:32:07 IST",
              "! Modified by: net-admin-pune",
              "! Change Ticket: CHG0019847",
              "!",
              "! ============================================================",
              "!  BANKING PAYMENT SERVICES - CORE NETWORK DEVICE",
              "!  Location: Pune Data Center - CLM Zone (Rack B-14)",
              "!  Role: Aggregation Switch for Payment Gateway Cluster",
              "! ============================================================",
              "",
              "version 8.4(2)",
              "hostname PUN-CLM-Nexus7000-WT1",
              "vdc PUN-CLM-Nexus7000-WT1 id 1",
              "  limit-resource vlan minimum 16 maximum 4094",
              "  limit-resource vrf minimum 2 maximum 4096",
              "  limit-resource port-channel minimum 0 maximum 768",
              "  limit-resource u4route-mem minimum 248 maximum 248",
              "  limit-resource u6route-mem minimum 96 maximum 96",
              "  limit-resource m4route-mem minimum 58 maximum 58",
              "  limit-resource m6route-mem minimum 8 maximum 8",
              "",
              "feature ospf",
              "feature bgp",
              "feature vpc",
              "feature lacp",
              "feature hsrp",
              "feature interface-vlan",
              "feature lldp",
              "feature bfd",
              "feature netflow",
              "feature scp-server",
              "",
              "!",
              "! ============================================================",
              "!  [ROOT CAUSE] QoS POLICY - MISCONFIGURED RATE LIMITING",
              "!  NOTE: The payment-traffic class rate limit was changed from",
              "!  10 gbps to 500 mbps during CHG0019847 on Feb 28.",
              "!  This is causing packet drops and increased latency for",
              "!  payment gateway traffic on VLAN 210.",
              "! ============================================================",
              "",
              "class-map type qos match-all payment-traffic",
              "  match access-group name PAYMENT-GW-TRAFFIC",
              "  match dscp af31",
              "",
              "class-map type qos match-all monitoring-traffic",
              "  match access-group name MONITORING-TRAFFIC",
              "  match dscp cs2",
              "",
              "class-map type qos match-all general-traffic",
              "  match access-group name GENERAL-TRAFFIC",
              "",
              "! >>> BUG: police rate changed from 10000000 kbps to 500000 kbps <<<",
              "! >>> Previous (working): police rate 10000000 kbps burst 1250000 kbytes <<<",
              "policy-map type qos PAYMENT-SERVICES-QOS",
              "  class payment-traffic",
              "    set dscp af31",
              "    police rate 500000 kbps burst 62500 kbytes",
              "      conform action transmit",
              "      exceed action drop",
              "      violate action drop",
              "  class monitoring-traffic",
              "    set dscp cs2",
              "    police rate 1000000 kbps burst 125000 kbytes",
              "      conform action transmit",
              "      exceed action drop",
              "  class general-traffic",
              "    police rate 2000000 kbps burst 250000 kbytes",
              "      conform action transmit",
              "      exceed action drop",
              "  class class-default",
              "    police rate 1000000 kbps burst 125000 kbytes",
              "",
              "!",
              "! ============================================================",
              "!  [ROOT CAUSE] MTU MISMATCH ON UPLINK INTERFACE",
              "!  NOTE: Ethernet1/1 MTU was reduced from 9216 (jumbo) to 1500",
              "!  during CHG0019847. Downstream servers still send jumbo frames",
              "!  causing fragmentation and retransmissions.",
              "! ============================================================",
              "",
              "! --- Uplink Interfaces to Core ---",
              "",
              "interface Ethernet1/1",
              "  description UPLINK-TO-CORE-PUN-SPINE01 [CHG0019847-modified]",
              "  no switchport",
              "  mtu 1500",
              "  ip address 10.240.1.1/30",
              "  ip ospf network point-to-point",
              "  ip ospf cost 10",
              "  ip router ospf PAYMENT-CORE area 0.0.0.0",
              "  service-policy type qos input PAYMENT-SERVICES-QOS",
              "  no shutdown",
              "",
              "interface Ethernet1/2",
              "  description UPLINK-TO-CORE-PUN-SPINE02",
              "  no switchport",
              "  mtu 9216",
              "  ip address 10.240.1.5/30",
              "  ip ospf network point-to-point",
              "  ip ospf cost 10",
              "  ip router ospf PAYMENT-CORE area 0.0.0.0",
              "  no shutdown",
              "",
              "!",
              "! --- Payment Gateway Server Interfaces (VLAN 210) ---",
              "!",
              "",
              "interface Ethernet2/1",
              "  description PAYMENT-GW-APP01 (SpringBoot-PaymentService)",
              "  switchport mode access",
              "  switchport access vlan 210",
              "  mtu 9216",
              "  spanning-tree port type edge",
              "  no shutdown",
              "",
              "interface Ethernet2/2",
              "  description PAYMENT-GW-APP02 (SpringBoot-PaymentService)",
              "  switchport mode access",
              "  switchport access vlan 210",
              "  mtu 9216",
              "  spanning-tree port type edge",
              "  no shutdown",
              "",
              "interface Ethernet2/3",
              "  description PAYMENT-GW-APP03 (SpringBoot-PaymentService)",
              "  switchport mode access",
              "  switchport access vlan 210",
              "  mtu 9216",
              "  spanning-tree port type edge",
              "  no shutdown",
              "",
              "interface Ethernet2/4",
              "  description PAYMENT-DB-PRIMARY (PostgreSQL-Cluster)",
              "  switchport mode access",
              "  switchport access vlan 220",
              "  mtu 9216",
              "  spanning-tree port type edge",
              "  no shutdown",
              "",
              "interface Ethernet2/5",
              "  description PAYMENT-DB-REPLICA (PostgreSQL-Cluster)",
              "  switchport mode access",
              "  switchport access vlan 220",
              "  mtu 9216",
              "  spanning-tree port type edge",
              "  no shutdown",
              "",
              "!",
              "! --- Port Channel to Warehouse/Backup ---",
              "!",
              "",
              "interface port-channel10",
              "  description PO-TO-WAREHOUSE-SWITCHES",
              "  switchport mode trunk",
              "  switchport trunk allowed vlan 210,220,230,240",
              "  mtu 9216",
              "  vpc 10",
              "",
              "interface Ethernet3/1",
              "  description PO10-MEMBER-1",
              "  switchport mode trunk",
              "  switchport trunk allowed vlan 210,220,230,240",
              "  mtu 9216",
              "  channel-group 10 mode active",
              "  no shutdown",
              "",
              "interface Ethernet3/2",
              "  description PO10-MEMBER-2",
              "  switchport mode trunk",
              "  switchport trunk allowed vlan 210,220,230,240",
              "  mtu 9216",
              "  channel-group 10 mode active",
              "  no shutdown",
              "",
              "!",
              "! ============================================================",
              "!  [ROOT CAUSE] BUFFER ALLOCATION - UNDERSIZED FOR PAYMENT VLAN",
              "!  NOTE: hardware qos memory was reduced during CHG0019847",
              "!  causing tail drops under peak payment processing load",
              "! ============================================================",
              "",
              "hardware qos ns-buffer-profile vlan 210 memory 256",
              "hardware qos ns-buffer-profile vlan 220 memory 512",
              "! >>> Previous (working): vlan 210 memory 2048 <<<",
              "",
              "!",
              "! --- VLAN Interfaces ---",
              "!",
              "",
              "interface Vlan210",
              "  description PAYMENT-GATEWAY-NETWORK",
              "  no shutdown",
              "  ip address 10.210.1.1/24",
              "  ip ospf passive-interface",
              "  ip router ospf PAYMENT-CORE area 0.0.0.10",
              "  hsrp version 2",
              "  hsrp 210",
              "    priority 120",
              "    preempt",
              "    ip 10.210.1.254",
              "",
              "interface Vlan220",
              "  description PAYMENT-DATABASE-NETWORK",
              "  no shutdown",
              "  ip address 10.220.1.1/24",
              "  ip ospf passive-interface",
              "  ip router ospf PAYMENT-CORE area 0.0.0.10",
              "  hsrp version 2",
              "  hsrp 220",
              "    priority 120",
              "    preempt",
              "    ip 10.220.1.254",
              "",
              "interface Vlan230",
              "  description MANAGEMENT-NETWORK",
              "  no shutdown",
              "  ip address 10.230.1.1/24",
              "  ip ospf passive-interface",
              "  ip router ospf PAYMENT-CORE area 0.0.0.10",
              "",
              "interface Vlan240",
              "  description MONITORING-NETWORK",
              "  no shutdown",
              "  ip address 10.240.10.1/24",
              "",
              "!",
              "! --- OSPF Configuration ---",
              "!",
              "",
              "router ospf PAYMENT-CORE",
              "  router-id 10.240.1.1",
              "  log-adjacency-changes detail",
              "  area 0.0.0.10 nssa",
              "",
              "!",
              "! --- BGP Configuration ---",
              "!",
              "",
              "router bgp 65210",
              "  router-id 10.240.1.1",
              "  address-family ipv4 unicast",
              "    network 10.210.1.0/24",
              "    network 10.220.1.0/24",
              "  neighbor 10.240.1.2",
              "    remote-as 65200",
              "    description CORE-PUN-SPINE01",
              "    address-family ipv4 unicast",
              "  neighbor 10.240.1.6",
              "    remote-as 65200",
              "    description CORE-PUN-SPINE02",
              "    address-family ipv4 unicast",
              "",
              "!",
              "! --- Access Control Lists ---",
              "!",
              "",
              "ip access-list PAYMENT-GW-TRAFFIC",
              "  10 permit tcp 10.210.1.0/24 any eq 443",
              "  20 permit tcp 10.210.1.0/24 any eq 8443",
              "  30 permit tcp any 10.210.1.0/24 eq 443",
              "  40 permit tcp any 10.210.1.0/24 eq 8443",
              "  50 permit tcp 10.210.1.0/24 10.220.1.0/24 eq 5432",
              "  60 permit tcp 10.220.1.0/24 10.210.1.0/24 established",
              "",
              "ip access-list MONITORING-TRAFFIC",
              "  10 permit udp any any eq 514",
              "  20 permit udp any any eq 6343",
              "  30 permit tcp any any eq 9090",
              "  40 permit icmp any any",
              "",
              "ip access-list GENERAL-TRAFFIC",
              "  10 permit ip any any",
              "",
              "!",
              "! --- NetFlow for Traffic Monitoring ---",
              "!",
              "",
              "flow exporter NETFLOW-EXPORT",
              "  destination 10.240.10.50",
              "  transport udp 2055",
              "  source Vlan240",
              "  version 9",
              "",
              "flow monitor PAYMENT-FLOW-MONITOR",
              "  exporter NETFLOW-EXPORT",
              "  record netflow-original",
              "",
              "!",
              "! --- Logging & SNMP ---",
              "!",
              "",
              "logging server 10.240.10.100 6 use-vrf default",
              "logging server 10.240.10.101 6 use-vrf default",
              "logging level all 6",
              "logging timestamp milliseconds",
              "",
              "snmp-server community PUN-RO-2026 ro",
              "snmp-server host 10.240.10.100 traps PUN-RO-2026",
              "snmp-server host 10.240.10.101 traps PUN-RO-2026",
              "snmp-server enable traps link",
              "snmp-server enable traps entity",
              "snmp-server enable traps snmp",
              "",
              "!",
              "! --- NTP ---",
              "!",
              "",
              "ntp server 10.240.10.10",
              "ntp server 10.240.10.11",
              "",
              "!",
              "! --- Management ---",
              "!",
              "",
              "interface mgmt0",
              "  ip address 10.250.1.41/24",
              "  no shutdown",
              "",
              "!",
              "! ============================================================",
              "!  CHANGE HISTORY",
              "! ============================================================",
              "!  CHG0019847 | 2026-02-28 | net-admin-pune",
              "!    - Reduced QoS police rate on payment-traffic class",
              "!      from 10 gbps to 500 mbps (per cost optimization request)",
              "!    - Changed Ethernet1/1 MTU from 9216 to 1500",
              "!    - Reduced buffer allocation for VLAN 210 from 2048 to 256",
              "!    - NOTE: Changes approved without load testing",
              "!",
              "!  CHG0018234 | 2026-01-15 | net-admin-pune",
              "!    - Added Ethernet2/3 for new PAYMENT-GW-APP03 server",
              "!    - Updated OSPF area for VLAN 210",
              "!",
              "!  CHG0017102 | 2025-12-01 | net-engineer-mum",
              "!    - Initial deployment and baseline configuration",
              "!    - All interfaces tested at full line rate",
              "!    - QoS policy validated with payment traffic simulation",
              "! ============================================================",
              "!",
              "end`;",
              "",
              "let encoded = btoa(unescape(encodeURIComponent(configContent.trim())));",
              "pm.collectionVariables.set('encoded_content', encoded);",
              "console.log('Config encoded (' + encoded.length + ' chars)');"
            ],
            "type": "text/javascript"
          }
        },
        {
          "listen": "test",
          "script": {
            "exec": [
              "if (pm.response.code === 200) {",
              "    let json = pm.response.json();",
              "    pm.collectionVariables.set('file_sha', json.content.sha);",
              "    console.log('=== FILE UPDATED SUCCESSFULLY ===');",
              "    console.log('Commit SHA: ' + json.commit.sha);",
              "    console.log('Commit URL: ' + json.commit.html_url);",
              "    console.log('File URL:   ' + json.content.html_url);",
              "",
              "    pm.test('Config updated successfully', function () {",
              "        pm.expect(json.content.name).to.contain('running-config');",
              "    });",
              "} else {",
              "    console.log('Error: ' + pm.response.text());",
              "    pm.test('Update failed', function () {",
              "        pm.expect.fail('Status: ' + pm.response.code);",
              "    });",
              "}"
            ],
            "type": "text/javascript"
          }
        }
      ],
      "request": {
        "method": "PUT",
        "header": [
          {
            "key": "Authorization",
            "value": "Bearer {{github_token}}"
          },
          {
            "key": "Accept",
            "value": "application/vnd.github+json"
          },
          {
            "key": "X-GitHub-Api-Version",
            "value": "2022-11-28"
          },
          {
            "key": "Content-Type",
            "value": "application/json"
          }
        ],
        "body": {
          "mode": "raw",
          "raw": "{\n  \"message\": \"fix: update PUN-CLM-Nexus7000-WT1 running config - CHG0019847 cost optimization changes\",\n  \"committer\": {\n    \"name\": \"Corey Cooper\",\n    \"email\": \"coreycooper762@gmail.com\"\n  },\n  \"content\": \"{{encoded_content}}\",\n  \"sha\": \"{{file_sha}}\",\n  \"branch\": \"{{branch}}\"\n}"
        },
        "url": {
          "raw": "https://api.github.com/repos/{{owner}}/{{repo}}/contents/{{file_path}}",
          "protocol": "https",
          "host": ["api", "github", "com"],
          "path": ["repos", "{{owner}}", "{{repo}}", "contents", "{{file_path}}"]
        }
      }
    }
  ]
}
